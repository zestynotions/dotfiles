
# Window Customization
window:
  dimensions:
    columns: 145
    lines: 44
  padding:
    x: 8
    y: 8
  decorations: none
scrolling:
  history: 10000
  multiplier: 3
background_opacity: 0.75
window.dynamic_title: true

# Font Customization
font:
  size: 16
  normal:
    family: FiraCode Nerd Font Mono
    style: Regular
    size: 14
  bold:
    family: FiraCode Nerd Font Mono
    style: Bold
  italic:
    family: FiraCode Nerd Font Mono
    style: Italic
  offset:
    x: 0
    y: 0
  glyph_offset:
    x: 0
    y: 0
  use_thin_strokes: false
  debug:
    persistent_logging: false
draw_bold_text_with_bright_colors: true


# Colors (Nord)
colors:
   # Default colors
   primary:
     background: '#000000' #'#2E3440'
     foreground: '#D8DEE9'

   # Normal colors
   normal:
     black:   '#3B4252'
     red:     '#BF616A'
     green:   '#A3BE8C'
     yellow:  '#EBCB8B'
     blue:    '#81A1C1'
     magenta: '#B48EAD'
     cyan:    '#88C0D0'
     white:   '#E5E9F0'

   # Bright colors
   bright:
     black:   '#4C566A'
     red:     '#BF616A'
     green:   '#A3BE8C'
     yellow:  '#EBCB8B'
     blue:    '#81A1C1'
     magenta: '#B48EAD'
     cyan:    '#8FBCBB'
     white:   '#ECEFF4'

selection:
    save_to_clipboard: true
    text: '0xffffff'
    background: '0xdc3232'
    white:   '0xffffff'

cursor:
  style: Block
  unfocused_hollow: true

mouse:
  hide_when_typing: true
  hints:
    modifiers: Shift
